[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
tuktuk_escrow = "EqS5XP2XknR8tQ3P3uZAy2xBEisWETVhis6apCKvGWQJ"

[registry]
url = "https://api.apr.dev"

[provider]
